# Slack app manifest for ShoulderTap (spec §7.1). Import this at https://api.slack.com/apps
# ("Create New App" -> "From an app manifest") to get a working app in one step, then copy the
# Bot User OAuth Token into SLACK_BOT_TOKEN and the Signing Secret into SLACK_SIGNING_SECRET in
# your .env (see .env.example) -- both referenced by name only from shouldertap.yaml, never
# inlined into config.
display_information:
  name: ShoulderTap
  description: Asks the right human expert when an AI agent gets stuck, and remembers the answer.
  background_color: "#2b2b2b"

features:
  bot_user:
    display_name: ShoulderTap
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write # send the ask/notification DMs
      - im:history # read reply threads in the DM
      - im:write # open/use DM channels with experts
      - users:read # resolve expert display names

settings:
  event_subscriptions:
    # Replace with your server's public URL -- e.g. https://shouldertap.yourcompany.com/api/v1/slack/events
    request_url: https://YOUR_SHOULDERTAP_HOST/api/v1/slack/events
    bot_events:
      - message.im # DM replies, mute/skip commands, and amendments all arrive as this event
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
