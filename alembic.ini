[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# sqlalchemy.url is intentionally left unset here -- alembic/env.py resolves the actual
# database URL at runtime through the same function the running app uses (see
# shouldertap.engine.store.engine.resolve_db_path / database_url_for), so alembic.ini and
# the app can never disagree about which file they're pointing at.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
