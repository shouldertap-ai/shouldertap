<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ShoulderTap — Approval Queue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .answer { white-space: pre-wrap; background: #f7f7f7; border-radius: 6px; padding: 0.75rem; margin: 0.5rem 0; }
    .structured { background: #eef6ff; border-radius: 6px; padding: 0.75rem; margin: 0.5rem 0; font-size: 0.9rem; }
    .row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.4rem; }
    button { padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }
    button.accept { background: #1f8a4c; color: white; border-color: #1f8a4c; }
    button.reject { background: #c0392b; color: white; border-color: #c0392b; }
    #empty { color: #666; }
    #token-bar { margin-bottom: 1.5rem; font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <h1>ShoulderTap — Approval Queue</h1>
  <div id="token-bar">
    Bearer token: <span id="token-status"></span>
    <button id="set-token">Set token</button>
  </div>
  <div id="list"></div>
  <p id="empty" style="display:none">Nothing pending review.</p>

  <script>
    const API = "/api/v1";

    function getToken() {
      return localStorage.getItem("shouldertap_token") || "";
    }

    function renderTokenBar() {
      document.getElementById("token-status").textContent = getToken() ? "set" : "not set";
    }

    document.getElementById("set-token").addEventListener("click", () => {
      const value = prompt("Paste the ShoulderTap API bearer token:", getToken());
      if (value !== null) {
        localStorage.setItem("shouldertap_token", value);
        renderTokenBar();
        load();
      }
    });

    async function apiFetch(path, options = {}) {
      const headers = Object.assign({}, options.headers, {
        "Content-Type": "application/json",
      });
      const token = getToken();
      if (token) headers["Authorization"] = "Bearer " + token;
      const resp = await fetch(API + path, Object.assign({}, options, { headers }));
      if (!resp.ok) throw new Error(await resp.text());
      return resp.status === 204 ? null : resp.json();
    }

    function card(proposal) {
      const div = document.createElement("div");
      div.className = "card";
      const structured = proposal.structured
        ? `<div class="structured"><strong>Structured:</strong><pre>${escapeHtml(JSON.stringify(proposal.structured, null, 2))}</pre></div>`
        : "";
      div.innerHTML = `
        <div class="meta">Request ${escapeHtml(proposal.request_id)} · kind ${escapeHtml(proposal.kind)} · consumer ${escapeHtml(proposal.consumer)}</div>
        <div class="meta">From ${escapeHtml(proposal.provenance.expert_name)} via ${escapeHtml(proposal.provenance.answered_via)}${proposal.confidence != null ? " · confidence " + proposal.confidence : ""}</div>
        <div class="answer">${escapeHtml(proposal.answer)}</div>
        ${structured}
        <div class="row">
          <input type="text" placeholder="your name" class="decided-by" />
          <button class="accept">Accept</button>
        </div>
        <div class="row">
          <input type="text" placeholder="rejection reason" class="reject-reason" />
          <button class="reject">Reject</button>
        </div>
      `;
      div.querySelector(".accept").addEventListener("click", async () => {
        const decidedBy = div.querySelector(".decided-by").value || "anonymous";
        await apiFetch(`/proposals/${proposal.id}/accept`, {
          method: "POST",
          body: JSON.stringify({ decided_by: decidedBy }),
        });
        load();
      });
      div.querySelector(".reject").addEventListener("click", async () => {
        const decidedBy = div.querySelector(".decided-by").value || "anonymous";
        const reason = div.querySelector(".reject-reason").value || "not accurate";
        await apiFetch(`/proposals/${proposal.id}/reject`, {
          method: "POST",
          body: JSON.stringify({ decided_by: decidedBy, reason }),
        });
        load();
      });
      return div;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }

    async function load() {
      const list = document.getElementById("list");
      const empty = document.getElementById("empty");
      list.innerHTML = "";
      let proposals = [];
      try {
        proposals = await apiFetch("/proposals?status=pending");
      } catch (e) {
        list.textContent = "Failed to load: " + e.message;
        return;
      }
      empty.style.display = proposals.length ? "none" : "block";
      proposals.forEach((p) => list.appendChild(card(p)));
    }

    renderTokenBar();
    load();
  </script>
</body>
</html>
